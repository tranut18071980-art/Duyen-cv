<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Lê Thùy Duyên - Tôn Đức Thắng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Arial', sans-serif; background: #e0eafc; background: linear-gradient(to right, #cfdef3, #e0eafc); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 25px; text-align: center; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #3498db; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        h1 { color: #2c3e50; font-size: 24px; margin: 5px 0; }
        .tagline { background: #3498db; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; font-size: 14px; margin-bottom: 20px; }
        .section { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px; text-align: left; border-left: 5px solid #3498db; }
        h2 { font-size: 18px; color: #2980b9; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .skill-box { background: white; padding: 10px; border-radius: 10px; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px; }
        .footer-img { width: 100%; border-radius: 15px; margin-top: 10px; }
        footer { font-size: 12px; color: #7f8c8d; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Duyen" class="profile-img">
    <h1>LÊ THÙY DUYÊN</h1>
    <div class="tagline">KẾ TOÁN VIÊN TƯƠNG LAI 📊</div>
    <p style="font-size: 14px;"><i class="fas fa-school"></i> THPT Tôn Đức Thắng</p>

    <div class="section">
        <h2><i class="fas fa-user"></i> Giới thiệu</h2>
        <p style="font-size: 14px;">Học sinh lớp 11 yêu các con số, tỉ mỉ và trách nhiệm. Mục tiêu chinh phục ngành Kế toán!</p>
    </div>

    <div class="section">
        <h2><i class="fas fa-star"></i> Thế mạnh</h2>
        <div class="skill-grid">
            <div class="skill-box"><i class="fas fa-calculator" style="color:#e74c3c"></i> Toán học</div>
            <div class="skill-box"><i class="fas fa-balance-scale" style="color:#f1c40f"></i> KT-PL</div>
            <div class="skill-box"><i class="fas fa-pen-nib" style="color:#9b59b6"></i> Ngữ Văn</div>
            <div class="skill-box"><i class="fas fa-globe-asia" style="color:#2ecc71"></i> Địa lý</div>
        </div>
    </div>

    <div class="section">
        <h2><i class="fas fa-bullseye"></i> Mục tiêu 2026</h2>
        <p style="font-size: 14px;">🎯 Đậu ĐH chuyên ngành Kế toán - Kiểm toán.</p>
        <img src="https://img.freepik.com/free-vector/accountant-concept-illustration_114360-1222.jpg" class="footer-img">
    </div>

    <footer>Created with ❤️ by Thuy Duyen</footer>
</div>
</body>
</html>
