<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Lê Thùy Duyên - Tôn Đức Thắng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root { --primary-color: #3498db; --secondary-color: #2c3e50; --bg-color: #f4f7f6; }
        body { font-family: 'Arial', sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; overflow-x: hidden; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/cubes.png'); opacity: 0.3; z-index: -1; }

        .container { max-width: 550px; margin: 20px auto; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 25px; position: relative; overflow: hidden; animation: fadeInDown 1s; }
        
        .profile-section { text-align: center; padding-bottom: 20px; }
        .profile-img-container { position: relative; display: inline-block; animation: float 3s ease-in-out infinite; }
        /* Style cho ảnh chân dung - ĐÃ CẬP NHẬT ĐỂ CHUYÊN NGHIỆP HƠN */
        .profile-img { width: 130px; height: 130px; border-radius: 50%; border: 6px solid #3498db; box-shadow: 0 10px 25px rgba(0,0,0,0.2); object-fit: cover; background-color: #f0f2f5; }
        .profile-img-container::after { content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 80px; height: 10px; background: rgba(0,0,0,0.1); border-radius: 50%; filter: blur(3px); animation: shadow 3s ease-in-out infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes shadow { 0%, 100% { width: 80px; opacity: 1; } 50% { width: 60px; opacity: 0.5; } }

        h1 { color: var(--secondary-color); font-size: 26px; margin: 15px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        .tagline { color: var(--primary-color); font-weight: bold; background: #eef7fe; display: inline-block; padding: 6px 20px; border-radius: 25px; font-size: 14px; margin-bottom: 15px; }
        .school { font-size: 14px; color: #7f8c8d; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; }

        .section { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .section:hover { border-color: var(--primary-color); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { font-size: 19px; color: var(--secondary-color); display: flex; align-items: center; gap: 12px; margin-top: 0; margin-bottom: 15px; }
        
        .
